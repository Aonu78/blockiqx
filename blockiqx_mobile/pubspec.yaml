name: blockiqx
description: BLOCKIQx - Incident Reporting & Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shimmer: ^3.0.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
